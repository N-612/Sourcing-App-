<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Laylatopia Sourcing</title>
<style>
:root{
  --bg:#faf8f4; --surface:#ffffff; --border:#e5e1d8; --border-strong:#d4cfc2;
  --text:#2c2c2a; --text-secondary:#5f5e5a; --text-muted:#888780;
  --accent:#185fa5; --success:#3b6d11; --success-bg:#eaf3de;
  --danger:#a32d2d; --danger-bg:#fcebeb; --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:74px;}
.screen{padding:16px;max-width:480px;margin:0 auto;}
h1{font-size:20px;font-weight:600;margin:4px 0 16px;text-align:center;}
h2{font-size:16px;font-weight:600;margin:20px 0 10px;}
h3{font-size:14px;font-weight:600;margin:14px 0 6px;color:var(--text-secondary);}
label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:4px;margin-top:12px;}
select,input,textarea{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:15px;background:var(--surface);color:var(--text);font-family:inherit;}
button{width:100%;padding:12px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface);font-size:15px;font-weight:600;margin-top:16px;color:var(--text);}
button.primary{background:var(--accent);color:#fff;border:none;}
button.small{width:auto;padding:8px 14px;font-size:13px;font-weight:500;margin-top:0;}
button.danger-text{color:var(--danger);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:14px;}
.row .muted{color:var(--text-secondary);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.result-box{border-radius:var(--radius);padding:14px;}
.result-box.good{background:var(--success-bg);color:var(--success);}
.result-box.bad{background:var(--danger-bg);color:var(--danger);}
.result-box p{margin:0;}
.result-box .pct{font-size:24px;font-weight:700;margin:4px 0;}
.result-box .label{font-size:12px;}
.result-box.primary-gate{border:2px solid currentColor;}
.breakdown{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:14px;font-size:13px;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 max(8px, env(safe-area-inset-bottom));}
nav button{all:unset;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text-muted);cursor:pointer;padding:4px 8px;}
nav button.active{color:var(--accent);}
.empty{text-align:center;color:var(--text-muted);font-size:14px;padding:30px 0;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.tag.good{background:var(--success-bg);color:var(--success);}
.tag.bad{background:var(--danger-bg);color:var(--danger);}
.top-actions{display:flex;gap:8px;margin-bottom:14px;}
.top-actions button{margin-top:0;}
.subtle{font-size:12px;color:var(--text-muted);margin-top:4px;}
hr{border:none;border-top:1px solid var(--border);margin:14px 0;}
</style>
</head>
<body>
<div id="app"></div>
<nav id="bottomNav"></nav>
<script>
const DEFAULT_SETTINGS = {
  proteins:["Kangaroo","Camel","Alpaca","Yak","Seal","Salmon","Venison","Bison","Buffalo","Emu","Ostrich","Rabbit","Duck","Turkey","Goose","Pheasant"],
  productTypes:["Muscle meat","Ground","Organs","Chews","Pre-processed"],
  costUnits:["Per pound","Per kilogram","Per gram","Per item","Per package (total cost)"],
  // yieldPct = % of raw weight that survives dehydration (protein-specific overrides go in proteinYields)
  productYields:{ "Muscle meat":30, "Ground":27, "Organs":25, "Chews":100, "Pre-processed":100 },
  proteinYields:{ "Bison":{"Ground":27}, "Camel":{"Ground":32.5} }, // proteinYields[protein][productType] = pct, overrides productYields default. These two are your real tested batch results.
  packageWeightGrams:{ "Muscle meat":80, "Ground":80, "Organs":45, "Chews":null, "Pre-processed":null },
  packagingCost:2.73, laborProduction:0.64, laborEvents:1.65,
  ecomShipping:15,
  marginTargetVendor:60, marginTargetEcom:40, maxSellPrice:40
};
const GRAMS_PER_LB = 453.592;
const FISH_KEYWORDS = ['salmon','tuna','trout','cod','halibut','sockeye','fish','tilapia','mackerel','herring','snapper'];
function isFish(proteinName){
  const n = (proteinName||'').toLowerCase();
  return FISH_KEYWORDS.some(k=>n.includes(k));
}
function loadAll(){ try{ const raw=localStorage.getItem('laylatopia_data'); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
let DB = loadAll() || {settings:JSON.parse(JSON.stringify(DEFAULT_SETTINGS)), quotes:[], suppliers:[], boxes:[], inventory:[], receipts:[]};
if(!DB.settings) DB.settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
if(!DB.settings.productYields) DB.settings.productYields = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.productYields));
if(!DB.settings.proteinYields) DB.settings.proteinYields = {};
if(!DB.settings.proteinYields['Bison']) DB.settings.proteinYields['Bison'] = {};
if(!DB.settings.proteinYields['Bison']['Ground']) DB.settings.proteinYields['Bison']['Ground'] = 27;
if(!DB.settings.proteinYields['Camel']) DB.settings.proteinYields['Camel'] = {};
if(!DB.settings.proteinYields['Camel']['Ground']) DB.settings.proteinYields['Camel']['Ground'] = 32.5;
if(!DB.settings.packageWeightGrams) DB.settings.packageWeightGrams = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.packageWeightGrams));
if(!DB.settings.costUnits) DB.settings.costUnits = DEFAULT_SETTINGS.costUnits;
if(!DB.settings.ecomShipping) DB.settings.ecomShipping = 15;
if(DB.settings.packagingCost===2.66) DB.settings.packagingCost = 2.73;
if(!DB.settings.maxSellPrice) DB.settings.maxSellPrice = 40;
if(!DB.settings.productTypes || DB.settings.productTypes.includes('Jerky') || !DB.settings.productTypes.includes('Pre-processed')){
  DB.settings.productTypes = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.productTypes));
  if(DB.settings.productYields && DB.settings.productYields['Jerky']){
    DB.settings.productYields['Muscle meat'] = DB.settings.productYields['Jerky'];
    delete DB.settings.productYields['Jerky'];
  }
}
if(!DB.settings.productYields) DB.settings.productYields = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.productYields));
if(!DB.settings.productYields['Pre-processed']) DB.settings.productYields['Pre-processed'] = 100;
if(DB.settings.productYields['Ground']===66) DB.settings.productYields['Ground'] = 27;
if(!DB.settings.packageWeightGrams) DB.settings.packageWeightGrams = JSON.parse(JSON.stringify(DEFAULT_SETTINGS.packageWeightGrams));
if(DB.settings.proteins && DB.settings.proteins.includes('Wagyu')){
  DB.settings.proteins = DB.settings.proteins.filter(p=>p!=='Wagyu');
}
if(!DB.batches) DB.batches = [];
if(!DB.shoppingNotes) DB.shoppingNotes = '';
if(!DB.shoppingQtyOverrides) DB.shoppingQtyOverrides = {};
if(!DB.shoppingProvince) DB.shoppingProvince = 'Ontario';
delete DB.settings.batchRatios;
function save(){ localStorage.setItem('laylatopia_data', JSON.stringify(DB)); }
function fmtMoney(n){ return '$'+(Math.round((n||0)*100)/100).toFixed(2); }
function fmtPct(n){ return (Math.round((n||0)*10)/10)+'%'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const KG_TO_LB = 2.20462;

function calcRawCostInLbs(costUnit, costAmount, qty, packageWeightUnit, numPackages){
  // Returns {rawCostTotal, rawLbs}
  if(costUnit === 'Per pound'){
    return { rawCostTotal: costAmount*qty, rawLbs: qty };
  } else if(costUnit === 'Per kilogram'){
    const lbs = qty * KG_TO_LB;
    return { rawCostTotal: costAmount*qty, rawLbs: lbs };
  } else if(costUnit === 'Per gram'){
    const lbs = qty / GRAMS_PER_LB;
    return { rawCostTotal: costAmount*qty, rawLbs: lbs };
  } else if(costUnit === 'Per package (total cost)'){
    // costAmount = price of ONE package, qty = weight of ONE package in chosen unit, numPackages = how many packages bought
    const n = numPackages && numPackages>0 ? numPackages : 1;
    let lbsPerPackage;
    if(packageWeightUnit === 'kg') lbsPerPackage = qty * KG_TO_LB;
    else if(packageWeightUnit === 'g') lbsPerPackage = qty / GRAMS_PER_LB;
    else lbsPerPackage = qty;
    return { rawCostTotal: costAmount*n, rawLbs: lbsPerPackage*n };
  } else { // Per item
    return { rawCostTotal: costAmount*qty, rawLbs: null, rawItems: qty };
  }
}
function getYieldPct(protein, productType){
  const s = DB.settings;
  const override = s.proteinYields[protein] && s.proteinYields[protein][productType];
  if(override) return override;
  if(isFish(protein) && (productType==='Muscle meat'||productType==='Organs')) return 20;
  return s.productYields[productType] || 30;
}
function calcQuote(protein, productType, costUnit, costAmount, qty, sellPrice, packageWeightUnit, sellPricePerPack, itemsPerPack, pkgGramsOverride, numPackages){
  const s = DB.settings;
  const raw = calcRawCostInLbs(costUnit, costAmount, qty, packageWeightUnit, numPackages);
  const yieldPct = getYieldPct(protein, productType);
  const pkgGrams = pkgGramsOverride || s.packageWeightGrams[productType];

  let bagsProduced;
  if(costUnit === 'Per item'){
    // chews/items: 1 raw item -> 1 finished item (yield doesn't apply to whole-item chews)
    const rawUnits = raw.rawItems!==undefined ? raw.rawItems : qty;
    bagsProduced = rawUnits * (yieldPct/100);
  } else {
    const rawGrams = (raw.rawLbs||0) * GRAMS_PER_LB;
    const finishedGrams = rawGrams * (yieldPct/100);
    bagsProduced = pkgGrams ? finishedGrams / pkgGrams : finishedGrams; // fallback if no pkg weight set
  }
  if(bagsProduced <= 0) bagsProduced = 0.01;

  // Effective sell price per finished bag, accounting for pack sizing
  const perPack = itemsPerPack && itemsPerPack>0 ? itemsPerPack : 1;
  const sellPerBag = sellPricePerPack ? (sellPrice / perPack) : sellPrice;

  const rawCostPerBag = raw.rawCostTotal / bagsProduced;
  const packaging = s.packagingCost / perPack;
  const laborVendor = s.laborEvents / perPack;
  const laborEcom = s.laborProduction / perPack;
  const costVendor = rawCostPerBag + packaging + laborVendor;
  const costEcom = rawCostPerBag + packaging + laborEcom;
  const vendorMargin = sellPerBag>0 ? ((sellPerBag-costVendor)/sellPerBag)*100 : 0;
  const ecomMargin = sellPerBag>0 ? ((sellPerBag-costEcom)/sellPerBag)*100 : 0;
  const beVendor = costVendor/(1-s.marginTargetVendor/100);
  const beEcom = costEcom/(1-s.marginTargetEcom/100);
  const bagsPerRawUnit = bagsProduced / (productType==='Chews' ? qty : (raw.rawLbs || qty));
  let maxRawCostVendor = null, maxRawCostEcom = null;
  if(sellPerBag>0 && bagsPerRawUnit>0){
    const maxTotalCostVendor = sellPerBag * (1 - s.marginTargetVendor/100);
    maxRawCostVendor = (maxTotalCostVendor - packaging - laborVendor) * bagsPerRawUnit;
    const maxTotalCostEcom = sellPerBag * (1 - s.marginTargetEcom/100);
    maxRawCostEcom = (maxTotalCostEcom - packaging - laborEcom) * bagsPerRawUnit;
  }
  return {
    rawCostTotal: raw.rawCostTotal, bagsProduced, rawCostPerBag, packaging,
    laborVendor, laborEcom, costVendor, costEcom, vendorMargin, ecomMargin, sellPerBag, yieldPct, perPack, sellPricePerPack,
    vendorGood: vendorMargin >= s.marginTargetVendor, ecomGood: ecomMargin >= s.marginTargetEcom,
    beVendor, beEcom, maxRawCostVendor, maxRawCostEcom
  };
}

const TABS = [
  {id:'price', label:'Price check', icon:'tag'},
  {id:'shoppinglist', label:'Shopping', icon:'cart'},
  {id:'suppliers', label:'Suppliers', icon:'store'},
  {id:'inventory', label:'Inventory', icon:'box'},
  {id:'receipts', label:'Receipts', icon:'receipt'},
  {id:'reports', label:'Reports', icon:'chart'},
  {id:'settings', label:'Settings', icon:'settings'}
];
const ICONS = {
  cart:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
  tag:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41 11 3.83A2 2 0 0 0 9.59 3.24L4 3a1 1 0 0 0-1 1l.24 5.59a2 2 0 0 0 .59 1.41l9.58 9.58a2 2 0 0 0 2.83 0l4.35-4.35a2 2 0 0 0 0-2.83z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>',
  store:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1-5h16l1 5"/><path d="M4 9v10h16V9"/></svg>',
  box:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8l-9-5-9 5v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg>',
  receipt:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>',
  chart:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>',
  settings:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.19.77.3 1.51.33H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
};
let currentTab = 'price';
function renderNav(){
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = TABS.map(t=>`<button data-tab="${t.id}" class="${t.id===currentTab?'active':''}">${ICONS[t.icon]}<span>${t.label}</span></button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ currentTab=b.dataset.tab; render(); }));
}
function render(){
  renderNav();
  const app = document.getElementById('app');
  if(currentTab==='price') app.innerHTML = renderPrice();
  else if(currentTab==='shoppinglist') app.innerHTML = renderShoppingList();
  else if(currentTab==='suppliers') app.innerHTML = renderSuppliers();
  else if(currentTab==='inventory') app.innerHTML = renderInventory();
  else if(currentTab==='receipts') app.innerHTML = renderReceipts();
  else if(currentTab==='reports') app.innerHTML = renderReports();
  else if(currentTab==='settings') app.innerHTML = renderSettings();
  attachHandlers();
}

// ---------------- PRICE CHECK ----------------
let priceState = { protein:'', customProtein:'', productType:'Muscle meat', costUnit:'Per pound', costAmount:'', qty:'', sellPrice:'', packageWeightUnit:'lb', sellPricePerPack:false, itemsPerPack:'', itemsPerPackError:false, numPackages:'', qtyMode:'packages', totalAmount:'', totalUnit:'lb' };
function renderPrice(){
  const s = DB.settings;
  const proteinOpts = s.proteins.map(p=>`<option ${priceState.protein===p?'selected':''}>${esc(p)}</option>`).join('') + `<option value="__custom__" ${priceState.protein==='__custom__'?'selected':''}>Type custom protein...</option>`;
  const productOpts = s.productTypes.map(p=>`<option ${priceState.productType===p?'selected':''}>${esc(p)}</option>`).join('');
  const unitOpts = s.costUnits.map(u=>`<option ${priceState.costUnit===u?'selected':''}>${esc(u)}</option>`).join('');
  const qtyLabel = priceState.costUnit === 'Per item' ? 'How many items are you buying?'
    : priceState.costUnit === 'Per kilogram' ? 'How many kilograms are you buying?'
    : priceState.costUnit === 'Per gram' ? 'How many grams are you buying?'
    : priceState.costUnit === 'Per package (total cost)' ? 'Package weight (choose the unit below; use the average if it\'s a range)'
    : 'How many pounds are you buying?';
  const costLabel = priceState.costUnit === 'Per package (total cost)' ? 'Total price for the whole package'
    : priceState.costUnit === 'Per gram' ? 'Price per single gram'
    : 'Price';
  const costHint = priceState.costUnit === 'Per gram' ? '<p class="subtle" style="margin-top:0;">Not the total package price. Use "Per package (total cost)" for that.</p>' : '';
  let resultsHtml = '';
  if(priceState.result){
    const r = priceState.result;
    const priceOverCap = r.sellPerBag > s.maxSellPrice;
    resultsHtml = `
      ${priceOverCap ? `<div class="breakdown" style="border-color:var(--danger);"><p class="subtle" style="margin:0;color:var(--danger);">This is above your $${s.maxSellPrice} max sell price \u2014 not realistic for vendor event cash pricing right now.</p></div>` : ''}
      <div class="grid2">
        <div class="result-box primary-gate ${r.vendorGood?'good':'bad'}">
          <p class="label">Vendor event (primary)</p>
          <p class="pct">${fmtPct(r.vendorMargin)}</p>
          <p class="label">${r.vendorGood?'Yes, hits target':'No, below '+s.marginTargetVendor+'%'}</p>
        </div>
        <div class="result-box ${r.ecomGood?'good':'bad'}">
          <p class="label">E-commerce</p>
          <p class="pct">${fmtPct(r.ecomMargin)}</p>
          <p class="label">${r.ecomGood?'Yes, hits target':'No, below '+s.marginTargetEcom+'%'}</p>
        </div>
      </div>
      <p class="subtle" style="text-align:center;margin:10px 0 0;">${r.vendorGood ? 'This works at vendor events.' : r.ecomGood ? 'Works for e-commerce, but not vendor events yet.' : 'Doesn\'t hit either target yet \u2014 check the breakdown below for options.'}</p>
      ${r.maxRawCostVendor!==null ? `
      <div class="card" style="text-align:center;margin-top:10px;">
        <p class="label" style="margin:0;">Max price you should pay</p>
        <p class="pct" style="margin:4px 0;">${r.maxRawCostVendor<0 ? 'Not achievable' : fmtMoney(r.maxRawCostVendor)+(priceState.costUnit==='Per item'?'/item':(priceState.costUnit==='Per kilogram'?'/kg':'/lb'))}</p>
        <p class="subtle" style="margin:0;">to hit your ${s.marginTargetVendor}% vendor target</p>
      </div>` : ''}
      <details style="margin-top:14px;">
      <summary style="cursor:pointer;color:var(--accent);font-weight:600;font-size:14px;padding:6px 0;">Show full breakdown</summary>
      <div class="breakdown">
        <div class="row"><span class="muted">${priceState.productType==='Pre-processed'?'Cost total':'Raw cost total'}</span><span>${fmtMoney(r.rawCostTotal)}</span></div>
        ${priceState.costUnit==='Per package (total cost)' ? `<div class="row"><span class="muted">Number of packages used</span><span>${(Math.round(r.numPackagesUsed*10)/10)}</span></div>` : ''}
        <div class="row"><span class="muted">Estimated bags produced</span><span>${(Math.round(r.bagsProduced*10)/10)}</span></div>
        <div class="row"><span class="muted">${priceState.productType==='Pre-processed'?'Cost per bag':'Raw cost per bag'}</span><span>${fmtMoney(r.rawCostPerBag)}</span></div>
        <div class="row"><span class="muted">Packaging${r.perPack>1?' (1/'+r.perPack+' share of one pack)':''}</span><span>${fmtMoney(r.packaging)}</span></div>
        <div class="row"><span class="muted">Labor (vendor)${r.perPack>1?' (1/'+r.perPack+' share)':''}</span><span>${fmtMoney(r.laborVendor)}</span></div>
        <div class="row"><span class="muted">Labor (e-commerce)${r.perPack>1?' (1/'+r.perPack+' share)':''}</span><span>${fmtMoney(r.laborEcom)}</span></div>
        <hr>
        <div class="row"><span style="font-weight:600;">Total cost per bag (vendor)</span><span style="font-weight:600;">${fmtMoney(r.costVendor)}</span></div>
        <div class="row"><span style="font-weight:600;">Total cost per bag (e-commerce)</span><span style="font-weight:600;">${fmtMoney(r.costEcom)}</span></div>
        <p class="subtle">Customer pays $${s.ecomShipping} shipping on e-commerce orders \u2014 not included in your cost.</p>
      </div>
      <div class="breakdown">
        <div class="row"><span class="muted">Break-even price (vendor, ${s.marginTargetVendor}%) \u2014 per finished ${priceState.costUnit==='Per item'?'item':'bag you sell'}</span><span>${fmtMoney(r.beVendor)}</span></div>
        <div class="row"><span class="muted">Break-even price (e-commerce, ${s.marginTargetEcom}%) \u2014 per finished ${priceState.costUnit==='Per item'?'item':'bag you sell'}</span><span>${fmtMoney(r.beEcom)}</span></div>
        ${r.sellPricePerPack && r.perPack>1 ? `
        <div class="row" style="font-weight:600;"><span>Break-even price \u2014 per pack of ${r.perPack} (vendor)</span><span>${fmtMoney(r.beVendor*r.perPack)}</span></div>
        <div class="row" style="font-weight:600;"><span>Break-even price \u2014 per pack of ${r.perPack} (e-commerce)</span><span>${fmtMoney(r.beEcom*r.perPack)}</span></div>` : ''}
      </div>
      ${priceState.costUnit==='Per item' ? `
      <div class="breakdown">
        <p class="subtle" style="margin-top:0;">Not sure what to charge or how many to bundle? Here's the minimum price needed at common pack sizes (capped at your $${s.maxSellPrice} max):</p>
        ${[1,2,3,4,5,10].map(n=>{
          const totalVendor = r.rawCostPerBag*n + s.packagingCost + s.laborEvents;
          const totalEcom = r.rawCostPerBag*n + s.packagingCost + s.laborProduction;
          const vPrice = totalVendor/(1-s.marginTargetVendor/100), ePrice = totalEcom/(1-s.marginTargetEcom/100);
          const vOver = vPrice > s.maxSellPrice, eOver = ePrice > s.maxSellPrice;
          return `<div class="row"><span class="muted">Pack of ${n} \u2014 vendor / e-commerce</span><span>${vOver?'Over $'+s.maxSellPrice+' cap':fmtMoney(vPrice)} / ${eOver?'Over $'+s.maxSellPrice+' cap':fmtMoney(ePrice)}</span></div>`;
        }).join('')}
      </div>` : ''}
      ${r.maxRawCostVendor!==null ? `
      <div class="breakdown">
        <p class="subtle" style="margin-top:0;">Suggested max ${priceState.productType==='Pre-processed'?'purchase':'raw material'} cost at $${(parseFloat(document.getElementById('pt_sell')?document.getElementById('pt_sell').value:0)||0)} sell price:</p>

        <div class="row"><span class="muted">E-commerce target (${s.marginTargetEcom}%)</span><span>${r.maxRawCostEcom<0 ? 'Not achievable at this price' : fmtMoney(r.maxRawCostEcom)+(priceState.costUnit==='Per item'?' per item':(priceState.costUnit==='Per kilogram'?' per kg':' per lb'))}</span></div>
        ${priceState.costUnit==='Per package (total cost)' ? `<p class="subtle">Shown per pound. Multiply by package weight for a total target price.</p>` : ''}
      </div>` : ''}
      </details>

    `;
  }
  return `

    <select id="pt_protein">${proteinOpts}</select>
    ${priceState.protein==='__custom__' ? `<input id="pt_customProtein" placeholder="Type protein name" value="${esc(priceState.customProtein)}" style="margin-top:8px;">` : ''}
    <label>Product type</label>
    <select id="pt_product">${productOpts}</select>
    ${priceState.costUnit!=='Per item' ? `
    <label>What size bag are you selling it in (grams)? ${DB.settings.packageWeightGrams[priceState.productType] ? '(leave blank to use your default of '+DB.settings.packageWeightGrams[priceState.productType]+'g)' : '(required for this product type)'}</label>
    <input id="pt_pkgGrams" type="number" placeholder="${DB.settings.packageWeightGrams[priceState.productType]||45}" value="${priceState.pkgGramsOverride||''}">` : ''}
    <label>Cost unit</label>
    <select id="pt_unit">${unitOpts}</select>
    <label>${costLabel}</label>
    <input id="pt_cost" type="number" inputmode="decimal" placeholder="12.00" value="${priceState.costAmount}">
    ${costHint}
    <label>${qtyLabel}</label>
    <input id="pt_qty" type="number" inputmode="decimal" placeholder="10" value="${priceState.qty}">
    ${priceState.costUnit==='Per package (total cost)' ? `
    <label>Weight unit</label>
    <select id="pt_packageUnit">
      <option value="lb" ${priceState.packageWeightUnit==='lb'?'selected':''}>Pounds</option>
      <option value="kg" ${priceState.packageWeightUnit==='kg'?'selected':''}>Kilograms</option>
      <option value="g" ${priceState.packageWeightUnit==='g'?'selected':''}>Grams</option>
    </select>
    <label>How many of these packages are you buying?</label>
    <input id="pt_numPackages" type="number" placeholder="1" value="${priceState.numPackages}">
    <p class="subtle" style="margin-top:0;">Don't know the package count? Fill in the total amount below and we'll calculate it for you.</p>
    <label>Total amount you're buying (optional)</label>
    <input id="pt_totalAmount" type="number" placeholder="e.g. 10" value="${priceState.totalAmount||''}">
    <label>Unit for that total</label>

      <option value="lb" ${priceState.totalUnit==='lb'?'selected':''}>Pounds</option>

    <label>Ideal sell price ${priceState.costUnit!=='Per item' ? '(per finished bag)' : ''}</label>

function attachPriceHandlers(){
  const p = document.getElementById('pt_protein'); if(!p) return;
  p.addEventListener('change', e=>{ priceState.protein=e.target.value; render(); });
  const cp = document.getElementById('pt_customProtein'); if(cp) cp.addEventListener('input', e=>priceState.customProtein=e.target.value);
  document.getElementById('pt_product').addEventListener('change', e=>{ priceState.productType=e.target.value; render(); });
  const pg = document.getElementById('pt_pkgGrams'); if(pg) pg.addEventListener('input', e=>priceState.pkgGramsOverride=e.target.value);
  document.getElementById('pt_unit').addEventListener('change', e=>{ priceState.costUnit=e.target.value; if(e.target.value!=='Per item'){ priceState.sellPricePerPack=false; priceState.itemsPerPackError=false; } render(); });
  document.getElementById('pt_cost').addEventListener('input', e=>priceState.costAmount=e.target.value);
  document.getElementById('pt_qty').addEventListener('input', e=>{ priceState.qty=e.target.value; if(document.getElementById('pt_totalAmount')) autoFillPackagesFromTotal(); });
  const pu = document.getElementById('pt_packageUnit'); if(pu) pu.addEventListener('change', e=>{ priceState.packageWeightUnit=e.target.value; autoFillPackagesFromTotal(); });
  const npEl = document.getElementById('pt_numPackages'); if(npEl) npEl.addEventListener('input', e=>priceState.numPackages=e.target.value);
  function autoFillPackagesFromTotal(){
    const totalAmount = parseFloat(document.getElementById('pt_totalAmount')?document.getElementById('pt_totalAmount').value:0)||0;
    if(!totalAmount) return;
    const totalUnit = document.getElementById('pt_totalUnit')?document.getElementById('pt_totalUnit').value:'lb';
    const pkgWeight = parseFloat(document.getElementById('pt_qty')?document.getElementById('pt_qty').value:0)||0;
    const pkgUnit = document.getElementById('pt_packageUnit')?document.getElementById('pt_packageUnit').value:'lb';
    if(!pkgWeight) return;
    const toGrams = (val,unit)=> unit==='kg' ? val*1000 : unit==='lb' ? val*453.592 : val;
    const numPackages = toGrams(totalAmount,totalUnit) / toGrams(pkgWeight,pkgUnit);
    priceState.numPackages = (Math.round(numPackages*10)/10).toString();
    const npInput = document.getElementById('pt_numPackages');
    if(npInput) npInput.value = priceState.numPackages;
  }
  const taEl = document.getElementById('pt_totalAmount'); if(taEl) taEl.addEventListener('input', e=>{ priceState.totalAmount=e.target.value; autoFillPackagesFromTotal(); });
  const tuEl = document.getElementById('pt_totalUnit'); if(tuEl) tuEl.addEventListener('change', e=>{ priceState.totalUnit=e.target.value; autoFillPackagesFromTotal(); });
  document.getElementById('pt_sell').addEventListener('input', e=>priceState.sellPrice=e.target.value);
  const sm = document.getElementById('pt_sellMode');
  if(sm) sm.addEventListener('change', e=>{ priceState.sellPricePerPack = e.target.value==='pack'; render(); });
  const ipp = document.getElementById('pt_itemsPerPack'); if(ipp) ipp.addEventListener('input', e=>{ priceState.itemsPerPack=e.target.value; if(priceState.itemsPerPackError && parseFloat(e.target.value)>0) priceState.itemsPerPackError=false; });
  document.getElementById('calcBtn').addEventListener('click', ()=>{
    priceState.productType = document.getElementById('pt_product').value;
    priceState.costUnit = document.getElementById('pt_unit').value;
    const costAmount = parseFloat(document.getElementById('pt_cost').value)||0;
    const qty = parseFloat(document.getElementById('pt_qty').value)||0;
    const sellPrice = parseFloat(document.getElementById('pt_sell').value)||0;
    if(priceState.sellPricePerPack){
      const itemsPerPackRaw = document.getElementById('pt_itemsPerPack') ? document.getElementById('pt_itemsPerPack').value : '';
      if(!itemsPerPackRaw || parseFloat(itemsPerPackRaw)<=0){
        priceState.itemsPerPackError = true;
        priceState.result = null;
        render();
        return;
      }
    }
    priceState.itemsPerPackError = false;
    const itemsPerPack = parseFloat(document.getElementById('pt_itemsPerPack')?document.getElementById('pt_itemsPerPack').value:1)||1;
    const proteinName = priceState.protein==='__custom__' ? (priceState.customProtein||'Custom') : priceState.protein;
    const numPackages = parseFloat(document.getElementById('pt_numPackages')?document.getElementById('pt_numPackages').value:1)||1;
    priceState.result = calcQuote(proteinName, priceState.productType, priceState.costUnit, costAmount, qty, sellPrice, priceState.packageWeightUnit, priceState.sellPricePerPack, itemsPerPack, parseFloat(priceState.pkgGramsOverride)||null, numPackages);
    priceState.result.numPackagesUsed = numPackages;
    priceState.result.proteinName = proteinName;
    render();
  });
  const saveBtn = document.getElementById('saveQuoteBtn');
  if(saveBtn) saveBtn.addEventListener('click', ()=>{
    const r = priceState.result;
    DB.quotes.push({
      id: uid(), date: todayStr(), protein: r.proteinName, productType: priceState.productType,
      sellPrice: parseFloat(document.getElementById('pt_sell').value)||0,
      vendorMargin: r.vendorMargin, ecomMargin: r.ecomMargin,
      accepted: r.vendorGood
    });
    save();
    alert('Quote saved.');
  });
}

const TAX_RATES = { 'Ontario':13, 'Quebec':14.975 };
let shoppingNotesText = null; // lazy-loaded from DB
let shoppingQtyOverrides = null;
let holdTimer = null, holdInterval = null;

function getShoppingNotes(){
  if(shoppingNotesText===null) shoppingNotesText = DB.shoppingNotes || '';
  return shoppingNotesText;
}
function getShoppingQtyOverrides(){
  if(shoppingQtyOverrides===null) shoppingQtyOverrides = DB.shoppingQtyOverrides || {};
  return shoppingQtyOverrides;
}
function saveShoppingState(){
  DB.shoppingNotes = shoppingNotesText;
  DB.shoppingQtyOverrides = shoppingQtyOverrides;
  DB.shoppingProvince = DB.shoppingProvince || 'Ontario';
  save();
}

function parseShoppingLine(text){
  const priceMatch = text.match(/(\d+(?:\.\d+)?)\s*\$/);
  if(!priceMatch) return null;
  const price = parseFloat(priceMatch[1]);
  const priceEndIdx = priceMatch.index + priceMatch[0].length;
  const afterPrice = text.slice(priceEndIdx);
  const beforePrice = text.slice(0, priceMatch.index);
  const wAfter = afterPrice.match(/(\d+(?:\.\d+)?)\s*(lb|kg|g)\b/i);
  let qty = 1;
  if(wAfter) qty = parseFloat(wAfter[1]);
  const name = beforePrice.replace(/^!/,'').replace(/\(.*?\)/g,'').replace(/\bmin\.?\b/gi,'').replace(/\s+/g,' ').trim() || 'Item';
  return { name, price, qty, total: price*qty };
}

function renderShoppingList(){
  const s = DB.settings;
  const notes = getShoppingNotes();
  const overrides = getShoppingQtyOverrides();
  const province = DB.shoppingProvince || 'Ontario';
  const lines = notes.split('\n');
  const parsed = lines.map(l=>({line:l, p:parseShoppingLine(l)})).filter(x=>x.p);

  const itemsHtml = parsed.map((x,idx)=>{
    const mult = overrides[x.line] || 1;
    const lineTotal = x.p.total * mult;
    return `<div class="row" style="align-items:center;">
      <span class="muted">${esc(x.p.name)} (${x.p.qty} \u00d7 ${fmtMoney(x.p.price)})</span>

        <span style="min-width:60px;text-align:right;">${fmtMoney(lineTotal)}</span>
      </span>
    </div>`;
  }).join('');

  const subtotal = parsed.reduce((a,x)=>a + x.p.total*(overrides[x.line]||1),0);
  const taxRate = TAX_RATES[province]||0;
  const taxAmount = subtotal*(taxRate/100);
  const total = subtotal+taxAmount;

  const flagged = lines.filter(l => l.trim().startsWith('!'));
  const flaggedHtml = flagged.map(f=>`<div class="card" style="background:#fff8e6;border-left:3px solid #e0a30d;"><span class="muted">\u2B50 ${esc(f.trim().slice(1).trim())}</span></div>`).join('');

  return `
  <div class="screen" style="padding-bottom:0;">
    <h1>Shopping list</h1>
    <p class="subtle" style="margin-top:0;">Tip: start a line with ! to flag it as important</p>

    ${flagged.length ? `
    <details style="margin-top:10px;">
      <summary style="cursor:pointer;color:#e0a30d;font-weight:600;font-size:14px;padding:6px 0;">\u2B50 ${flagged.length} important</summary>
      <div style="margin-top:6px;">${flaggedHtml}</div>
    </details>` : ''}
    <details style="margin-top:10px;">
      <summary style="cursor:pointer;color:var(--accent);font-weight:600;font-size:14px;padding:6px 0;">+ price calc</summary>
      <div class="card" style="margin-top:8px;">
        <label>Province</label>
        <select id="shopProvince">
          <option ${province==='Ontario'?'selected':''}>Ontario</option>
          <option ${province==='Quebec'?'selected':''}>Quebec</option>
        </select>
        ${itemsHtml || '<div class="empty">No priced items yet \u2014 write a line with a $ amount.</div>'}
        <hr>
        <div class="row"><span class="muted">Subtotal</span><span>${fmtMoney(subtotal)}</span></div>
        <div class="row"><span class="muted">Tax (${taxRate}%)</span><span>${fmtMoney(taxAmount)}</span></div>
        <div class="row" style="font-weight:600;"><span>Total</span><span>${fmtMoney(total)}</span></div>
      </div>
    </details>
  </div>`;
}

function bumpQty(line, delta){
  const overrides = getShoppingQtyOverrides();
  overrides[line] = Math.max(1, (overrides[line]||1) + delta);
  saveShoppingState();
  render();
}
function attachHold(btn, line, delta){
  const start = ()=>{
    bumpQty(line, delta);
    holdTimer = setTimeout(()=>{
      holdInterval = setInterval(()=>bumpQty(line, delta), 120);
    }, 500);
  };
  const stop = ()=>{ clearTimeout(holdTimer); clearInterval(holdInterval); };
  btn.addEventListener('mousedown', start);
  btn.addEventListener('touchstart', (e)=>{ e.preventDefault(); start(); });
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev=>btn.addEventListener(ev, stop));
}

function attachShoppingListHandlers(){
  const notesEl = document.getElementById('shopNotes'); if(!notesEl) return;
  notesEl.addEventListener('input', e=>{
    shoppingNotesText = e.target.value;
    saveShoppingState();
    render();
  });
  const provEl = document.getElementById('shopProvince');
  if(provEl) provEl.addEventListener('change', e=>{ DB.shoppingProvince = e.target.value; save(); render(); });

  const lines = getShoppingNotes().split('\n');
  const parsed = lines.map(l=>({line:l, p:parseShoppingLine(l)})).filter(x=>x.p);
  document.querySelectorAll('[data-qtyup]').forEach(btn=>{
    attachHold(btn, parsed[btn.dataset.qtyup].line, 1);
  });
  document.querySelectorAll('[data-qtydown]').forEach(btn=>{
    attachHold(btn, parsed[btn.dataset.qtydown].line, -1);
  });
}

      ${salesHtml}

      <input data-sale-qty="${b.id}" type="number" placeholder="e.g. 3">
      <button class="small" data-sale-btn="${b.id}" style="width:100%;margin-top:6px;">Record sale</button>
    </div>`;
  }).join('') : '<div class="empty">No batches logged yet.</div>';

  return `
  <div class="screen">
    <h1>Inventory</h1>
    <h2>Batch / production log</h2>
    <div class="card">
      <label>Date</label>
      <input id="b_date" type="date" value="${batchState.date}">
      <label>Protein type</label>
      <select id="b_protein">${DB.settings.proteins.map(p=>`<option ${batchState.protein===p?'selected':''}>${esc(p)}</option>`).join('')}</select>
      <label>Product type</label>
      <select id="b_product">${DB.settings.productTypes.map(p=>`<option ${batchState.productType===p?'selected':''}>${esc(p)}</option>`).join('')}</select>
      <label>Start from</label>
      <select id="b_mode">
        <option value="bags" ${batchState.mode==='bags'?'selected':''}>Finished bags only</option>
        <option value="raw" ${batchState.mode==='raw'?'selected':''}>Raw weight (optional)</option>
      </select>
      ${batchState.mode==='raw' ? `<label>Raw weight started with (lb)</label><input id="b_rawWeight" type="number" value="${batchState.rawWeight}">` : ''}
      <label>Finished bags produced</label>
      <input id="b_bags" type="number" value="${batchState.bagsProduced}">
      <label>Cost per bag</label>
      <input id="b_cost" type="number" value="${batchState.costPerBag}">
      <label>Sell price per bag (for break-even tracking)</label>
      <input id="b_sellPrice" type="number" value="${batchState.sellPrice||''}">
      <button class="primary" id="logBatchBtn">Log batch</button>
    </div>
    ${batchCards}

    <h2>Cost allocator (mixed box)</h2>
    <div class="card">
      <label>Total box cost</label>
      <input id="boxCost" type="number" placeholder="150.00" value="${invState.boxCost}">
      <hr>
      <label>Add organ/item</label>
      <input id="itemName" placeholder="e.g. Yak tongue">
      <input id="itemWeight" type="number" placeholder="Weight (lb) - leave blank if unknown" style="margin-top:8px;">
      <button class="small" id="addItemBtn" style="width:100%;">Add item</button>
      ${itemsHtml}
      <button class="primary" id="allocateBtn">Calculate allocation</button>
      ${allocation}
    </div>
  </div>`;
}
function attachInventoryHandlers(){
  const bd = document.getElementById('b_date'); if(!bd) return;
  bd.addEventListener('input', e=>batchState.date=e.target.value);
  document.getElementById('b_protein').addEventListener('change', e=>batchState.protein=e.target.value);
  document.getElementById('b_product').addEventListener('change', e=>batchState.productType=e.target.value);
  document.getElementById('b_mode').addEventListener('change', e=>{ batchState.mode=e.target.value; render(); });
  const rw = document.getElementById('b_rawWeight'); if(rw) rw.addEventListener('input', e=>batchState.rawWeight=e.target.value);
  document.getElementById('b_bags').addEventListener('input', e=>batchState.bagsProduced=e.target.value);
  document.getElementById('b_cost').addEventListener('input', e=>batchState.costPerBag=e.target.value);
  const bSellEl = document.getElementById('b_sellPrice'); if(bSellEl) bSellEl.addEventListener('input', e=>batchState.sellPrice=e.target.value);
  document.getElementById('logBatchBtn').addEventListener('click', ()=>{
    const bagsProduced = parseFloat(document.getElementById('b_bags').value)||0;
    const costPerBag = parseFloat(document.getElementById('b_cost').value)||0;
    const sellPrice = parseFloat(document.getElementById('b_sellPrice')?document.getElementById('b_sellPrice').value:0)||0;
    if(!bagsProduced) return;
    if(!DB.batches) DB.batches = [];
    DB.batches.push({
      id: uid(), date: batchState.date, protein: batchState.protein, productType: batchState.productType,
      rawWeight: batchState.mode==='raw' ? (parseFloat(document.getElementById('b_rawWeight')?.value)||null) : null,
      bagsProduced, costPerBag, sellPrice, sold: []
    });
    save();
    batchState = { date: todayStr(), protein:'', productType:'Muscle meat', mode:'bags', rawWeight:'', bagsProduced:'', costPerBag:'', sellPrice:'' };
    render();
  });
  document.querySelectorAll('[data-sale-btn]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.saleBtn;
      const input = document.querySelector(`[data-sale-qty="${id}"]`);
      const qty = parseFloat(input.value)||0;
      if(!qty) return;
      const batch = DB.batches.find(b=>b.id===id);
      batch.sold = batch.sold || [];
      batch.sold.push({qty, date: todayStr()});
      save();
      render();
    });
  });
  const bc = document.getElementById('boxCost'); if(!bc) return;
  bc.addEventListener('input', e=>invState.boxCost=e.target.value);
  document.getElementById('addItemBtn').addEventListener('click', ()=>{
    const name = document.getElementById('itemName').value.trim();
    const weight = parseFloat(document.getElementById('itemWeight').value)||0;
    if(!name) return;
    invState.items.push({name, weight});
    render();
  });
  document.querySelectorAll('[data-rmitem]').forEach(el=>{
    el.addEventListener('click', ()=>{ invState.items.splice(parseInt(el.dataset.rmitem),1); render(); });
  });
  document.getElementById('allocateBtn').addEventListener('click', ()=>{
    const totalCost = parseFloat(invState.boxCost)||0;
    const items = invState.items;
    if(!items.length) return;
    const haveWeights = items.every(i=>i.weight>0);
    let result;
    if(haveWeights){
      const totalW = items.reduce((a,i)=>a+i.weight,0);
      result = items.map(i=>({name:i.name, cost: totalCost * (i.weight/totalW)}));
    } else {
      const each = totalCost / items.length;
      result = items.map(i=>({name:i.name, cost: each}));
    }
    invState.result = result;
    DB.boxes.push({id:uid(), date:todayStr(), totalCost, items, result});
    save();
    render();
  });
}

// ---------------- RECEIPTS ----------------
let receiptState = { type:'single', supplier:'', desc:'', amount:'', category:'Raw materials', date: todayStr(), pkgItem:'Pouch', pkgCost:'', pkgQty:'', lineItems:[] };
const EXPENSE_CATS = ['Raw materials','Packaging & labels','Production','Overhead','Labor'];
const PACKAGING_ITEMS = ['Pouch','Oxygen absorber','Front label','Back label','Logo label','Shopping bag label','Shopping bag','Corner postcard','Poly mailer','Gas allocation'];
function renderReceipts(){
  const isMulti = receiptState.type === 'multi';
  const isPackaging = receiptState.category === 'Packaging & labels';
  const lineItemsHtml = receiptState.lineItems.map((li,idx)=>`
    <div class="row"><span>${esc(li.name)} \u00d7 ${li.qty}</span><span>${fmtMoney(li.total)} <button class="small danger-text" data-rmline="${idx}" style="margin:0 0 0 6px;padding:2px 8px;">x</button></span></div>
  `).join('');
  const lineTotal = receiptState.lineItems.reduce((a,li)=>a+li.total,0);
  const searchTerm = (receiptState.search||'').toLowerCase();
  const filteredReceipts = DB.receipts.filter(r=>!searchTerm || (r.desc||'').toLowerCase().includes(searchTerm) || (r.supplier||'').toLowerCase().includes(searchTerm) || (r.category||'').toLowerCase().includes(searchTerm));
  const list = filteredReceipts.length ? filteredReceipts.slice().reverse().map(r=>`
    <div class="card"><div class="row"><span style="font-weight:500;">${esc(r.desc)}</span><span>${fmtMoney(r.amount)}</span></div>
    <div class="row"><span class="muted">${esc(r.supplier||'')}</span><span class="muted">${r.category}</span></div>
    <div class="row"><span class="muted">${r.date}</span></div></div>
  `).join('') : (DB.receipts.length ? '<div class="empty">No receipts match your search.</div>' : '<div class="empty">No receipts logged yet.</div>');
  return `
  <div class="screen">
    <h1>Receipts</h1>
    <input id="rSearch" placeholder="Search receipts..." value="${esc(receiptState.search||'')}" style="margin-bottom:14px;">
    <div class="card">
      <label>Receipt type</label>
      <select id="rType"><option value="single" ${!isMulti?'selected':''}>Single product</option><option value="multi" ${isMulti?'selected':''}>Multi-product (allocate)</option></select>
      <label>Supplier / source</label>
      <input id="rSupplier" placeholder="e.g. ULINE, Green Valley Ranch" value="${esc(receiptState.supplier)}">
      <label>Category</label>
      <select id="rCategory">${EXPENSE_CATS.map(c=>`<option ${receiptState.category===c?'selected':''}>${c}</option>`).join('')}</select>

      ${isPackaging ? `
      <label>Packaging item</label>
      <select id="rPkgItem">${PACKAGING_ITEMS.map(p=>`<option ${receiptState.pkgItem===p?'selected':''}>${p}</option>`).join('')}<option value="__custom__">+ Add new item</option></select>
      <label>Cost per unit</label>
      <input id="rPkgCost" type="number" placeholder="0.20" value="${receiptState.pkgCost}">
      <label>Quantity purchased</label>
      <input id="rPkgQty" type="number" placeholder="1000" value="${receiptState.pkgQty}">
      <button class="small" id="addLineBtn" style="width:100%;">Add item</button>
      ` : (isMulti ? `
      <label>Item description</label>
      <input id="rItemDesc" placeholder="e.g. Yak muscle meat">
      <label>Amount for this item</label>
      <input id="rItemAmount" type="number" placeholder="45.00">
      <button class="small" id="addLineBtn" style="width:100%;">Add item</button>
      ` : `
      <label>Description</label>
      <input id="rDesc" placeholder="e.g. Pouches from ULINE" value="${esc(receiptState.desc)}">
      <label>Amount</label>
      <input id="rAmount" type="number" placeholder="45.00" value="${receiptState.amount}">
      `)}

      ${(isPackaging || isMulti) && receiptState.lineItems.length ? `
      <div class="breakdown">${lineItemsHtml}<hr><div class="row" style="font-weight:600;"><span>Receipt total</span><span>${fmtMoney(lineTotal)}</span></div></div>
      ` : ''}

      <label>Date</label>
      <input id="rDate" type="date" value="${receiptState.date}">
      <button class="primary" id="addReceiptBtn">Save receipt</button>
    </div>
    <h2>Logged receipts</h2>
    ${list}
  </div>`;
}
function attachReceiptHandlers(){
  const rSearch = document.getElementById('rSearch'); if(rSearch) rSearch.addEventListener('input', e=>{ receiptState.search=e.target.value; render(); });
  const typeEl = document.getElementById('rType'); if(!typeEl) return;
  typeEl.addEventListener('change', e=>{ receiptState.type=e.target.value; receiptState.lineItems=[]; render(); });
  document.getElementById('rSupplier').addEventListener('input', e=>receiptState.supplier=e.target.value);
  document.getElementById('rCategory').addEventListener('change', e=>{ receiptState.category=e.target.value; receiptState.lineItems=[]; render(); });

  const pkgItem = document.getElementById('rPkgItem'); if(pkgItem) pkgItem.addEventListener('change', e=>receiptState.pkgItem=e.target.value);
  const pkgCost = document.getElementById('rPkgCost'); if(pkgCost) pkgCost.addEventListener('input', e=>receiptState.pkgCost=e.target.value);
  const pkgQty = document.getElementById('rPkgQty'); if(pkgQty) pkgQty.addEventListener('input', e=>receiptState.pkgQty=e.target.value);

  const rDesc = document.getElementById('rDesc'); if(rDesc) rDesc.addEventListener('input', e=>receiptState.desc=e.target.value);
  const rAmount = document.getElementById('rAmount'); if(rAmount) rAmount.addEventListener('input', e=>receiptState.amount=e.target.value);
  document.getElementById('rDate').addEventListener('input', e=>receiptState.date=e.target.value);

  const addLineBtn = document.getElementById('addLineBtn');
  if(addLineBtn) addLineBtn.addEventListener('click', ()=>{
    if(receiptState.category==='Packaging & labels'){
      const name = receiptState.pkgItem==='__custom__' ? prompt('New packaging item name:') : receiptState.pkgItem;
      const cost = parseFloat(document.getElementById('rPkgCost').value)||0;
      const qty = parseFloat(document.getElementById('rPkgQty').value)||0;
      if(!name || !qty) return;
      receiptState.lineItems.push({name, qty, total: cost*qty});
    } else {
      const name = document.getElementById('rItemDesc').value.trim();
      const total = parseFloat(document.getElementById('rItemAmount').value)||0;
      if(!name || !total) return;
      receiptState.lineItems.push({name, qty:1, total});
    }
    render();
  });
  document.querySelectorAll('[data-rmline]').forEach(el=>{
    el.addEventListener('click', ()=>{ receiptState.lineItems.splice(parseInt(el.dataset.rmline),1); render(); });
  });

  const btn = document.getElementById('addReceiptBtn');
  btn.addEventListener('click', ()=>{
    const supplier = receiptState.supplier;
    const category = receiptState.category;
    const date = receiptState.date || todayStr();
    const isPackaging = category === 'Packaging & labels';
    const isMulti = receiptState.type === 'multi';
    let desc, amount, lineItems;
    if(isPackaging || isMulti){
      if(!receiptState.lineItems.length) return;
      amount = receiptState.lineItems.reduce((a,li)=>a+li.total,0);
      desc = receiptState.lineItems.map(li=>li.name).join(', ');
      lineItems = receiptState.lineItems;
    } else {
      desc = document.getElementById('rDesc').value.trim();
      amount = parseFloat(document.getElementById('rAmount').value)||0;
      if(!desc || !amount) return;
    }
    DB.receipts.push({id:uid(), supplier, desc, amount, category, date, lineItems});
    save();
    receiptState = { type:'single', supplier:'', desc:'', amount:'', category:'Raw materials', date: todayStr(), pkgItem:'Pouch', pkgCost:'', pkgQty:'', lineItems:[] };
    render();
  });
}

// ---------------- REPORTS ----------------
function renderReports(){
  const byCategory = {};
  DB.receipts.forEach(r=>{ byCategory[r.category] = (byCategory[r.category]||0) + r.amount; });
  const totalExpenses = Object.values(byCategory).reduce((a,b)=>a+b,0);
  const byProtein = {};
  DB.quotes.forEach(q=>{ if(!byProtein[q.protein]) byProtein[q.protein]={count:0, sum:0}; byProtein[q.protein].count++; byProtein[q.protein].sum += q.vendorMargin; });
  const quoteSearch = (reportState.quoteSearch||'').toLowerCase();
  const filteredQuotes = (DB.quotes||[]).filter(q=>!quoteSearch || (q.protein||'').toLowerCase().includes(quoteSearch) || (q.productType||'').toLowerCase().includes(quoteSearch));
  return `
  <div class="screen">
    <h1>Reports</h1>
    <h2>Expenses by category (tax)</h2>
    ${Object.keys(byCategory).length? Object.entries(byCategory).map(([c,v])=>`
      <div class="row"><span>${c}</span><span>${fmtMoney(v)}</span></div>
    `).join('') + `<hr><div class="row"><span style="font-weight:600;">Total</span><span style="font-weight:600;">${fmtMoney(totalExpenses)}</span></div>`
      : '<div class="empty">No receipts logged yet.</div>'}
    <h2>Average margin by protein (vendor)</h2>
    ${Object.keys(byProtein).length? Object.entries(byProtein).map(([p,v])=>`
      <div class="row"><span>${p}</span><span>${fmtPct(v.sum/v.count)} (${v.count} quotes)</span></div>
    `).join('') : '<div class="empty">No quotes saved yet.</div>'}
    <h2>Saved quotes</h2>
    <input id="quoteSearch" placeholder="Search saved quotes by protein..." value="${esc(reportState.quoteSearch||'')}">
    ${filteredQuotes.length ? filteredQuotes.slice().reverse().map(q=>`
      <div class="card"><div class="row"><span style="font-weight:600;">${esc(q.protein)} \u2014 ${esc(q.productType)}</span><span class="muted">${q.date}</span></div>
      <div class="row"><span class="muted">Sell price</span><span>${fmtMoney(q.sellPrice)}</span></div>
      <div class="row"><span class="muted">Vendor / e-com margin</span><span>${fmtPct(q.vendorMargin)} / ${fmtPct(q.ecomMargin)}</span></div></div>
    `).join('') : '<div class="empty">No saved quotes match.</div>'}
    <button class="small" id="exportCsvBtn" style="width:100%;">Export receipts as CSV</button>
  </div>`;
}
let reportState = { quoteSearch:'' };
function attachReportHandlers(){
  const qSearch = document.getElementById('quoteSearch'); if(qSearch) qSearch.addEventListener('input', e=>{ reportState.quoteSearch=e.target.value; render(); });
  const btn = document.getElementById('exportCsvBtn'); if(!btn) return;
  btn.addEventListener('click', ()=>{
    let csv = 'Date,Description,Category,Amount\n';
    DB.receipts.forEach(r=>{ csv += `${r.date},"${r.desc.replace(/"/g,'""')}",${r.category},${r.amount}\n`; });
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'receipts.csv'; a.click();
    URL.revokeObjectURL(url);
  });
}

// ---------------- SETTINGS ----------------
function renderSettings(){
  const s = DB.settings;
  return `
  <div class="screen">
    <h1>Settings</h1>
    <h2>Backup your data</h2>
    <p class="subtle" style="margin-top:0;">Everything is stored only on this device. Export a backup regularly and save it somewhere safe (email, Google Drive) in case something happens to your phone.</p>
    <button class="primary" id="exportDataBtn">Export all my data</button>
    <label>Restore from a backup file</label>
    <input id="importDataFile" type="file" accept=".json">
    <button class="small" id="importDataBtn" style="width:100%;">Import backup</button>
    <h2>Margin targets</h2>
    <label>Vendor event minimum margin % (primary)</label>
    <input id="setVendorTarget" type="number" value="${s.marginTargetVendor}">
    <label>E-commerce minimum margin %</label>
    <input id="setEcomTarget" type="number" value="${s.marginTargetEcom}">
    <label>Max sell price you're willing to charge right now</label>
    <input id="setMaxSell" type="number" value="${s.maxSellPrice}">
    <h2>Packaging & labor (per pouch)</h2>
    <label>Packaging total</label>
    <input id="setPackaging" type="number" value="${s.packagingCost}">
    <label>Labor - production (e-commerce)</label>
    <input id="setLaborProd" type="number" value="${s.laborProduction}">
    <label>Labor - vendor events</label>
    <input id="setLaborEvents" type="number" value="${s.laborEvents}">
    <label>E-commerce shipping (customer pays)</label>
    <input id="setShipping" type="number" value="${s.ecomShipping}">
    <h2>Dehydration yield % and package size (by product type)</h2>
    <p class="subtle" style="margin-top:0;">Placeholder yields until you test each protein. Once you test a specific protein, add its override below.</p>
    ${s.productTypes.map(pt=>{
      const y = s.productYields[pt];
      const g = s.packageWeightGrams[pt];
      return `<h3>${pt}</h3>
      <div class="grid2">
        <div><label>Yield %</label><input data-yield-pct="${pt}" type="number" value="${y}"></div>
        <div><label>Package size (g)</label><input data-pkg-grams="${pt}" type="number" value="${g||''}" placeholder="n/a for chews"></div>
      </div>`;
    }).join('')}
    <h2>Protein-specific yield overrides</h2>
    <label>Protein</label>
    <select id="ov_protein">${s.proteins.map(p=>`<option>${esc(p)}</option>`).join('')}<option value="__custom__">Type custom protein...</option></select>
    <input id="ov_customProtein" placeholder="Type protein name" style="display:none;margin-top:8px;">
    <label>Product type</label>
    <select id="ov_product">${s.productTypes.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
    <label>Tested yield % for this specific protein</label>
    <input id="ov_yield" type="number" placeholder="e.g. 22">
    <button class="small" id="saveOverrideBtn" style="width:100%;">Save override</button>
    <div class="subtle">Overrides saved: ${Object.keys(s.proteinYields).length? Object.entries(s.proteinYields).map(([p,po])=>Object.entries(po).map(([pt,y])=>`${p}/${pt}: ${y}%`).join(', ')).join(' | ') : 'none yet'}</div>
    <button class="primary" id="saveSettingsBtn">Save settings</button>
  </div>`;
}
function attachSettingsHandlers(){
  const expBtn = document.getElementById('exportDataBtn');
  if(expBtn) expBtn.addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'sourcing-app-backup-'+todayStr()+'.json'; a.click();
    URL.revokeObjectURL(url);
  });
  const impBtn = document.getElementById('importDataBtn');
  if(impBtn) impBtn.addEventListener('click', ()=>{
    const fileInput = document.getElementById('importDataFile');
    if(!fileInput.files.length){ alert('Choose a backup file first.'); return; }
    if(!confirm('This will replace all current data with the backup file. Continue?')) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const imported = JSON.parse(e.target.result);
        DB = imported;
        save();
        alert('Backup restored.');
        render();
      }catch(err){
        alert('Could not read that file. Make sure it\'s a backup exported from this app.');
      }
    };
    reader.readAsText(fileInput.files[0]);
  });
  const btn = document.getElementById('saveSettingsBtn'); if(!btn) return;
  btn.addEventListener('click', ()=>{
    const s = DB.settings;
    s.marginTargetVendor = parseFloat(document.getElementById('setVendorTarget').value)||s.marginTargetVendor;
    s.marginTargetEcom = parseFloat(document.getElementById('setEcomTarget').value)||s.marginTargetEcom;
    s.maxSellPrice = parseFloat(document.getElementById('setMaxSell').value)||s.maxSellPrice;
    s.packagingCost = parseFloat(document.getElementById('setPackaging').value)||s.packagingCost;
    s.laborProduction = parseFloat(document.getElementById('setLaborProd').value)||s.laborProduction;
    s.laborEvents = parseFloat(document.getElementById('setLaborEvents').value)||s.laborEvents;
    s.ecomShipping = parseFloat(document.getElementById('setShipping').value)||s.ecomShipping;
    s.productTypes.forEach(pt=>{
      const yEl = document.querySelector(`[data-yield-pct="${pt}"]`);
      const gEl = document.querySelector(`[data-pkg-grams="${pt}"]`);
      if(yEl) s.productYields[pt] = parseFloat(yEl.value)||s.productYields[pt];
      if(gEl && gEl.value) s.packageWeightGrams[pt] = parseFloat(gEl.value)||s.packageWeightGrams[pt];
    });
    save();
    alert('Settings saved.');
  });
  const ovProteinSel = document.getElementById('ov_protein');
  if(ovProteinSel){
    ovProteinSel.addEventListener('change', e=>{
      const customInput = document.getElementById('ov_customProtein');
      if(customInput) customInput.style.display = e.target.value==='__custom__' ? 'block' : 'none';
    });
  }
  const ovBtn = document.getElementById('saveOverrideBtn');
  if(ovBtn) ovBtn.addEventListener('click', ()=>{
    const selected = document.getElementById('ov_protein').value;
    const protein = selected==='__custom__' ? (document.getElementById('ov_customProtein').value.trim()||'Custom') : selected;
    const productType = document.getElementById('ov_product').value;
    const yieldVal = parseFloat(document.getElementById('ov_yield').value);
    if(!yieldVal) return;
    if(!DB.settings.proteinYields[protein]) DB.settings.proteinYields[protein] = {};
    DB.settings.proteinYields[protein][productType] = yieldVal;
    save();
    render();
  });
}

function attachHandlers(){
  attachPriceHandlers();
  attachShoppingListHandlers();
  attachSupplierHandlers();
  attachInventoryHandlers();
  attachReceiptHandlers();
  attachReportHandlers();
  attachSettingsHandlers();
}
render();
</script>
